{% extends "base.html" %}

{% block title %}Register | Farmer Market{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST">
        <h1 data-i18n="createAccount">Create Account</h1>

        <label for="name" data-i18n="fullName">Full Name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" data-i18n-placeholder="namePlaceholder" required>

        <label for="phone" data-i18n="phoneNumber">Phone Number</label>
        <input id="phone" name="phone" type="tel" placeholder="Enter your phone number" data-i18n-placeholder="phonePlaceholder" required>

        <label for="place" data-i18n="placeName">Place</label>
        <input id="place" name="place" type="text" placeholder="Enter your place" data-i18n-placeholder="placePlaceholder" required>

        <button type="submit" data-i18n="register">Register</button>
        <p><span data-i18n="alreadyAccount">Already have an account?</span> <a href="{{ url_for('login') }}" data-i18n="loginHere">Login here</a></p>
    </form>
</section>
{% endblock %}
