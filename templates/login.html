{% extends "base.html" %}

{% block title %}Login | Farmer Market{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST">
        <h1 data-i18n="welcomeBack">Welcome Back</h1>

        <label for="name" data-i18n="fullName">Full Name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" data-i18n-placeholder="namePlaceholder" required>

        <label for="phone" data-i18n="phoneNumber">Phone Number</label>
        <input id="phone" name="phone" type="tel" placeholder="Enter your phone number" data-i18n-placeholder="phonePlaceholder" required>

        <button type="submit" data-i18n="login">Login</button>
        <p><span data-i18n="newUser">New user?</span> <a href="{{ url_for('register') }}" data-i18n="createAccountLower">Create an account</a></p>
    </form>
</section>
{% endblock %}
