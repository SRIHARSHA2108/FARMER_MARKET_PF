{% extends "base.html" %}

{% block title %}Login | Farmer Market{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST">
        <h1 data-i18n="welcomeBack">Welcome Back</h1>

        <label for="email" data-i18n="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Enter your email" data-i18n-placeholder="emailPlaceholder" required>

        <label for="password" data-i18n="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" data-i18n-placeholder="passwordPlaceholder" required>

        <button type="submit" data-i18n="login">Login</button>
        <p><span data-i18n="newUser">New user?</span> <a href="{{ url_for('register') }}" data-i18n="createAccountLower">Create an account</a></p>
    </form>
</section>
{% endblock %}
